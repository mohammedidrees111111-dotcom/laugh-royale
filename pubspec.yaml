name: laugh_royale
description: Laugh Royale - The Ultimate Laugh Challenge Game
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_analytics: ^10.8.9

  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  camera: ^0.10.5+9
  flutter_webrtc: 0.11.6
  google_mlkit_face_mesh_detection: ^0.2.1

  google_sign_in: ^6.2.1

  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
